<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de CEP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Consulta de CEP</h1>
        
        <form id="form">
            <label for="endereco">Endereço (Rua, Cidade, Estado):</label>
            <input type="text" id="endereco" placeholder="Ex: Rua dos Três Irmãos, São Paulo, SP" required>
            
            <button type="submit">Buscar CEP</button>
        </form>
        
        <div id="resultado">
            <!-- Aqui será exibido o resultado do CEP -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
